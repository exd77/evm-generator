<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900" role="img" aria-labelledby="title desc">
<title id="title">EVM Generator CLI output</title>
<desc id="desc">A black terminal-style menu for EVM Generator with a yellow-to-orange gradient banner and boxed command groups.</desc>
<defs>
  <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#FFE873"/>
    <stop offset="45%" stop-color="#FFD000"/>
    <stop offset="100%" stop-color="#FF8A00"/>
  </linearGradient>
  <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="3" dy="3" stdDeviation="0" flood-color="#4B2700" flood-opacity="0.9"/>
  </filter>
  <style>
    .bg { fill: #000; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, &quot;Liberation Mono&quot;, monospace; }
    .banner { font-size: 18px; font-weight: 900; fill: url(#titleGrad); stroke: #FFD34D; stroke-width: .25px; filter: url(#glow); }
    .subtitle { font-size: 16px; fill: #8b7b2c; font-weight: 700; }
    .boxText { font-size: 16px; fill: #f2f2f2; }
    .num { fill: #FFD000; font-weight: 800; }
    .label { fill: #f3f3f3; font-weight: 700; }
    .desc { fill: #6f6f6f; font-weight: 700; }
    .prompt { font-size: 17px; fill: #f0f0f0; }
    .caret { fill: #f0f0f0; }
  </style>
</defs>
<rect class="bg" width="1280" height="900"/>
<text class="mono banner" x="28" y="42">в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв•—   в–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв•—   в–Ҳв–Ҳв–Ҳв•—     в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв•—   в–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— </text>
